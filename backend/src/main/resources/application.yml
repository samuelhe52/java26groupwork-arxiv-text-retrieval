spring:
  application:
    name: final-assignment-backend
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

server:
  port: 8080

app:
  corpus:
    document-keyword-count: 8
    year-keyword-since: 2015
    year-keyword-count: 10
    year-keyword-min-count: 40
    search-default-limit: 20
    search-max-limit: 50
    index-max-document-frequency-ratio: 0.20
  demo:
    prebuilt-snapshot-path: ../datasets/prebuilt-cluster-demo/snapshot.json
  hadoop:
    mode: local
    config-dir: ${HADOOP_CONF_DIR:${HADOOP_HOME:${user.home}/hadoop}/etc/hadoop}
    input-path: ../datasets/arxiv-cs-lg-2015-now-primary-cs-only
    output-path: /datasets/output
